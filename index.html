<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pilot Checklist" />
    <meta name="description" content="FlightCheck — Best in class Pilot's checklist for all aircraft types." />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>FlightCheck</title>
  </head>
  <body class="bg-cockpit-bg text-cockpit-text-primary">
    <div id="root"></div>
    <div id="__boot_status" style="position:fixed;inset:0;padding:20px;color:#fff;font:14px/1.4 -apple-system,system-ui,monospace;white-space:pre-wrap;overflow:auto;pointer-events:none;z-index:99999;">
      <div id="__boot_log">[boot] index.html parsed</div>
    </div>
    <script>
      (function () {
        var log = document.getElementById('__boot_log');
        var append = function (msg) {
          if (log) log.textContent += '\n' + msg;
        };
        window.addEventListener('error', function (e) {
          append('[error] ' + (e.message || e.error) + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
        });
        window.addEventListener('unhandledrejection', function (e) {
          append('[reject] ' + (e.reason && (e.reason.stack || e.reason.message || e.reason)));
        });
        append('[boot] window.location = ' + window.location.href);
        append('[boot] userAgent = ' + navigator.userAgent.slice(0, 80));
        // Hide diagnostic once React mounts content into #root
        var checkMount = setInterval(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) {
            var diag = document.getElementById('__boot_status');
            if (diag) diag.style.display = 'none';
            clearInterval(checkMount);
          }
        }, 250);
        setTimeout(function () { append('[boot] +3s elapsed'); }, 3000);
        setTimeout(function () { append('[boot] +10s elapsed — React likely failed to mount'); }, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
