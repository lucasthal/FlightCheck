<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Amber gradient background (same as header's bg-gradient-to-br from-cockpit-amber to-orange-500 container) -->
  <rect width="24" height="24" fill="url(#bg)"/>
  <rect width="24" height="24" fill="url(#glow)"/>

  <!-- Flight-path checkmark trail (identical to header SVG) -->
  <path d="M 3 13 Q 5 15 8 18 Q 9 18 14 12"
        stroke="white"
        stroke-width="2.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Simplified Cessna silhouette (identical to header SVG) -->
  <path transform="translate(17 8) rotate(-50)"
        d="M 2.5 0 L 1.2 -0.45 L 1.2 -2.2 L -0.2 -2.2 L -0.2 -0.45 L -2 -0.45 L -2.5 0 L -2 0.45 L -0.2 0.45 L -0.2 2.2 L 1.2 2.2 L 1.2 0.45 Z"
        fill="white"/>
</svg>
