<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="1024" height="1024">
  <defs>
    <!-- Same 2-stop gradient as the header (cockpit-amber → orange-500) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="24" height="24" fill="url(#bg)"/>

  <!-- Flight-path checkmark trail (shifted +0.5 in x to center the composition) -->
  <path d="M 3.5 13 Q 5.5 15 8.5 18 Q 9.5 18 14.5 12"
        stroke="white"
        stroke-width="2.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Simplified Cessna silhouette (shifted +0.5 in x to center the composition) -->
  <path transform="translate(17.5 8) rotate(-50)"
        d="M 2.5 0 L 1.2 -0.45 L 1.2 -2.2 L -0.2 -2.2 L -0.2 -0.45 L -2 -0.45 L -2.5 0 L -2 0.45 L -0.2 0.45 L -0.2 2.2 L 1.2 2.2 L 1.2 0.45 Z"
        fill="white"/>
</svg>
