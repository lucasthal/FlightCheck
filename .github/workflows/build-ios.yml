name: Build iOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (Capacitor mode — relative paths, no service worker)
        run: npm run build
        env:
          CAPACITOR_BUILD: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_REVENUECAT_WEB_KEY: ${{ secrets.VITE_REVENUECAT_WEB_KEY }}
          VITE_REVENUECAT_IOS_KEY: ${{ secrets.VITE_REVENUECAT_IOS_KEY }}

      - name: Sync Capacitor (iOS assets)
        run: npx cap sync ios

      - name: Import Distribution Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DISTRIBUTION_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}

      - name: Import Provisioning Profile
        run: |
          PP_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_PATH"
          echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 -d > "$PP_PATH/FlightCheck.mobileprovision"

      - name: Decode App Store Connect API Key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPSTORE_API_KEY_BASE64 }}" | base64 -d > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

      - name: Select Xcode 26
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -resolvePackageDependencies

      - name: Build and archive
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            -destination "generic/platform=iOS" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            archive

      - name: Export IPA
        run: |
          sed -i '' "s/YOUR_APPLE_TEAM_ID/${{ secrets.APPLE_TEAM_ID }}/g" ios/App/ExportOptions.plist
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportPath ios/App/output \
            -exportOptionsPlist ios/App/ExportOptions.plist

      - name: Upload to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            -f ios/App/output/App.ipa \
            -t ios \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_API_ISSUER_ID }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ios/App/output/App.ipa
          retention-days: 30
