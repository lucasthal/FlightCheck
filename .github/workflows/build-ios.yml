name: Build iOS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor (iOS assets)
        run: npx cap sync ios

      - name: Decode App Store Connect API Key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPSTORE_API_KEY_BASE64 }}" | base64 -d > ~/.private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -resolvePackageDependencies

      - name: Build and archive
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }} \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            archive

      - name: Export IPA
        run: |
          sed -i '' "s/YOUR_APPLE_TEAM_ID/${{ secrets.APPLE_TEAM_ID }}/g" ios/App/ExportOptions.plist
          xcodebuild \
            -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportPath ios/App/output \
            -exportOptionsPlist ios/App/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool \
            --upload-app \
            -f ios/App/output/App.ipa \
            --apiKey ${{ secrets.APPSTORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPSTORE_API_ISSUER_ID }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-ipa
          path: ios/App/output/App.ipa
          retention-days: 30
